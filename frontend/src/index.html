<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <base href="/">
  <title>KP PDF</title>
</head>
<body>
<app-root>
  <style>
    .app-splash {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 32px;
      background: #f5f5f7;
      color: #1d1d1f;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0.01em;
    }

    .app-splash__content {
      width: min(360px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .app-splash__title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 500;
      color: #1d1d1f;
    }

    .app-splash__progress {
      width: 100%;
      height: 2px;
      border-radius: 999px;
      background: rgba(29, 29, 31, 0.1);
      overflow: hidden;
    }

    .app-splash__progress::after {
      content: "";
      display: block;
      width: 45%;
      height: 100%;
      border-radius: inherit;
      background: #1d1d1f;
      transform: translateX(-120%);
      animation: app-splash-loading 1.2s ease-in-out infinite;
    }

    @keyframes app-splash-loading {
      to {
        transform: translateX(280%);
      }
    }
  </style>
  <div class="app-splash" aria-live="polite" aria-label="Загрузка приложения">
    <div class="app-splash__content">
      <p class="app-splash__title">KP PDF</p>
      <div class="app-splash__progress" aria-hidden="true"></div>
    </div>
  </div>
</app-root>
</body>
</html>
