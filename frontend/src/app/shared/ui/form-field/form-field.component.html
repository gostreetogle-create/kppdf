@if (label()) {
  <label class="ui-form-field__label">
    {{ label() }}
    @if (required()) { <span class="ui-required"></span> }
  </label>
}
<div class="ui-form-field__control" [class.ui-form-field__control--error]="!!errorText()">
  <ng-content />
</div>
@if (errorText()) {
  <p class="ui-form-field__error">{{ errorText() }}</p>
} @else if (hint()) {
  <p class="ui-form-field__hint">{{ hint() }}</p>
}
