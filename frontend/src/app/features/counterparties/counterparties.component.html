<div class="page">
  <div class="page-header">
    <h1>Контрагенты</h1>
    <button ui-btn variant="primary" (click)="openCreate()">+ Создать</button>
  </div>

  <div class="page-toolbar">
    <ui-search-input
      [value]="search()"
      placeholder="Поиск по названию или ИНН..."
      (valueChange)="search.set($event)"
    />
    <ui-filter-select
      [value]="filterRole()"
      [options]="[
        { value: '', label: 'Все роли' },
        { value: 'client', label: 'Клиент' },
        { value: 'supplier', label: 'Поставщик' },
        { value: 'company', label: 'Наша компания' }
      ]"
      (valueChange)="filterRole.set($any($event))"
    />
    <ui-filter-select
      [value]="filterStatus()"
      [options]="[
        { value: '', label: 'Все статусы' },
        { value: 'active', label: 'Активен' },
        { value: 'inactive', label: 'Неактивен' }
      ]"
      (valueChange)="filterStatus.set($any($event))"
    />
  </div>

  @if (error()) {
    <ui-alert type="error">{{ error() }}</ui-alert>
  }

  @if (loading()) {
    <div class="loading-state">Загрузка...</div>
  } @else if (counterparties().length === 0) {
    <div class="empty-state">
      <p>Контрагенты не найдены</p>
      <button ui-btn variant="primary" (click)="openCreate()">Создать первого</button>
    </div>
  } @else {
    <app-counterparty-table
      [counterparties]="counterparties()"
      (edit)="openEdit($event)"
      (delete)="confirmDelete($event)">
    </app-counterparty-table>
  }
</div>

@if (formOpen()) {
  <app-counterparty-form
    [counterparty]="editTarget()"
    (saved)="onSaved($event)"
    (cancelled)="closeForm()">
  </app-counterparty-form>
}
