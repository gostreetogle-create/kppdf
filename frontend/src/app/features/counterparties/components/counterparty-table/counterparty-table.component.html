<div class="table-scroll">
  <table class="cp-table counterparty-table data-table">
    <colgroup>
      <col class="col-name" />
      <col class="col-inn" />
      <col class="col-actions" />
    </colgroup>
    <thead>
      <tr>
        <th class="col-name">Короткое название</th>
        <th class="col-inn">ИНН</th>
        <th class="col-actions"></th>
      </tr>
    </thead>
    <tbody>
      @for (cp of counterparties(); track cp._id) {
        <tr>
          <td class="col-name">
            <span class="cp-name">{{ cp.shortName || cp.name }}</span>
          </td>
          <td class="col-inn">{{ cp.inn }}</td>
          <td class="col-actions">
            <div class="ui-table-actions">
              @if (showBrandingButton()) {
                <button
                  ui-btn
                  size="sm"
                  variant="ghost"
                  class="icon-action-btn"
                  title="Шаблоны брендирования"
                  aria-label="Шаблоны брендирования"
                  (click)="branding.emit(cp)">🎨</button>
              }
              <button
                ui-btn
                size="sm"
                class="icon-action-btn"
                title="Изменить"
                aria-label="Изменить"
                (click)="edit.emit(cp)">✎</button>
              <button
                ui-btn
                size="sm"
                variant="danger"
                class="icon-action-btn"
                title="Удалить"
                aria-label="Удалить"
                (click)="delete.emit(cp)">🗑</button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
