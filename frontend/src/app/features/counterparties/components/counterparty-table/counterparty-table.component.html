<div class="table-scroll">
  <table class="cp-table counterparty-table data-table">
    <thead>
      <tr>
        <th class="col-name">Название</th>
        <th class="col-inn">ИНН</th>
        <th class="col-role">Роль</th>
        <th class="col-status">Статус</th>
        <th class="col-form">Орг. форма</th>
        <th class="col-actions"></th>
      </tr>
    </thead>
    <tbody>
      @for (cp of counterparties(); track cp._id) {
        <tr>
          <td class="col-name">
            <span class="cp-name">{{ cp.shortName || cp.name }}</span>
          </td>
          <td class="col-inn">{{ cp.inn }}</td>
          <td class="col-role">
            @for (role of displayedRoles(cp); track role) {
              @if (role === 'company') {
                <ui-status-badge variant="company" label="Наша компания"></ui-status-badge>
              } @else {
                <ui-status-badge [variant]="roleVariant(role)" [label]="roleLabel(role)"></ui-status-badge>
              }
            }
          </td>
          <td class="col-status">
            <ui-status-badge [variant]="cp.status === 'active' ? 'active' : 'inactive'"></ui-status-badge>
          </td>
          <td class="col-form">{{ cp.legalForm }}</td>
          <td class="col-actions">
            <div class="ui-table-actions">
              <button ui-btn size="sm" (click)="edit.emit(cp)">Изменить</button>
              <button ui-btn size="sm" variant="danger" (click)="delete.emit(cp)">Удалить</button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
