<div class="cart-item" cdkDrag>
  <label class="item-select">
    <input type="checkbox" [checked]="isSelected()" [disabled]="isReadOnly()" (change)="selectionChange.emit($any($event.target).checked)" />
  </label>
  <div class="item-handle" cdkDragHandle>⋮⋮</div>
  <div class="item-thumb">
    @if (imageUrl()) {
      <img [src]="imageUrl()" [alt]="item().name" loading="lazy" />
    } @else {
      <div class="no-photo"></div>
    }
  </div>
  <div class="item-info">
    <span class="name">{{ item().name }}</span>
    <span class="meta">
      Арт: {{ item().code || '—' }} · База: {{ item().price | number:'1.0-0' }} ₽
    </span>
  </div>
  <div class="item-actions">
    <div class="stepper">
      <button class="stepper-btn" [disabled]="isReadOnly()" (click)="decrement.emit()">-</button>
      <input type="number" [value]="item().qty" [disabled]="isReadOnly()" (change)="qtyChange.emit(+$any($event.target).value)" class="qty-input" min="1" />
      <button class="stepper-btn" [disabled]="isReadOnly()" (click)="increment.emit()">+</button>
    </div>
    <span class="total-price">{{ itemUnitPrice() * item().qty | number:'1.0-0' }} ₽</span>
  </div>
  <div class="item-remove-slot">
    <button class="edit-btn" type="button" [disabled]="isReadOnly()" (click)="edit.emit()" title="Редактировать товар">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
    </button>
    <button class="remove-btn" type="button" [disabled]="isReadOnly()" (click)="remove.emit()">×</button>
  </div>
</div>
