<div class="sidebar-section sidebar-section--items" [class.sidebar-section--open]="!collapsed()">
  <button class="sidebar-section__title-btn" (click)="toggleCollapsed.emit()">
    <span class="sidebar-section__title">Состав КП</span>
    <span class="sidebar-section__chevron">{{ collapsed() ? '▸' : '▾' }}</span>
  </button>
  @if (!collapsed()) {
    <div class="manual-item-form">
      <button ui-btn size="sm" variant="ghost" class="manual-item-form__add" [disabled]="isReadOnly()" (click)="openCreateProduct.emit()">
        + Добавить товар
      </button>
    </div>
    <div class="items-drop-list" cdkDropList cdkDropListLockAxis="y" [cdkDropListData]="items()" (cdkDropListDropped)="reorder.emit($event)">
      @for (item of items(); track item.productId) {
        <app-kp-cart-item
          [item]="item"
          [isSelected]="selectedItemIds().includes(item.productId)"
          [isReadOnly]="isReadOnly()"
          [itemUnitPrice]="itemUnitPriceResolver()(item)"
          [imageUrl]="imageUrlResolver()(item.imageUrl)"
          (selectionChange)="itemSelectionChange.emit({ item, checked: $event })"
          (qtyChange)="qtyChange.emit({ item, qty: $event })"
          (decrement)="decrementQty.emit(item)"
          (increment)="incrementQty.emit(item)"
          (remove)="removeItem.emit(item)"
        />
      }
    </div>
    <div class="sidebar-footer">
      <div class="bulk-adjustments">
        <div class="bulk-adjustments__row">
          <label>
            <span>Наценка (%)</span>
            <input class="form-control" type="number" min="0" max="500" step="1" [disabled]="isReadOnly() || items().length === 0" [value]="bulkMarkupPercent()" (input)="bulkMarkupInput.emit($any($event.target).value)" />
          </label>
          <label>
            <span>Скидка (%)</span>
            <input class="form-control" type="number" min="0" max="100" step="1" [disabled]="isReadOnly() || items().length === 0" [value]="bulkDiscountPercent()" (input)="bulkDiscountInput.emit($any($event.target).value)" />
          </label>
        </div>
        <div class="bulk-adjustments__actions">
          <button ui-btn size="sm" variant="ghost" [disabled]="isReadOnly() || items().length === 0" (click)="clearBulkAdjustments.emit()">
            Сбросить наценку/скидку
          </button>
        </div>
      </div>
      @if (items().length > 0) {
        <div class="sidebar-total">
          <span>Итого с НДС {{ vatPercent() }}%:</span>
          <strong>{{ total() | number:'1.0-0' }} ₽</strong>
        </div>
      }
    </div>
    @if (lastRemovedItem()) {
      <button ui-btn size="sm" variant="ghost" [disabled]="isReadOnly()" (click)="undoRemoveItem.emit()">
        Вернуть удалённый товар
      </button>
    }
    @if (items().length === 0) {
      <p class="sidebar-empty">Добавьте товары из каталога</p>
    }
  }
</div>
