<div class="page">
  <div class="page-header">
    <h1>Настройки</h1>
    <div style="display:flex;gap:.75rem">
      <a routerLink="/" ui-btn>← Назад</a>
      <button ui-btn variant="primary" (click)="save()" [disabled]="saving()">
        {{ saving() ? 'Сохранение...' : 'Сохранить' }}
      </button>
    </div>
  </div>

  @if (loading()) {
    <div class="loading-state">Загрузка...</div>
  } @else {
    <div class="settings-grid">
      @for (setting of settings(); track setting.key) {
        <div class="setting-row">
          <label class="setting-row__label">{{ setting.label }}</label>
          <input
            class="setting-row__input"
            type="number"
            [(ngModel)]="values[setting.key]"
            min="0"
          />
        </div>
      }
    </div>
  }
</div>
