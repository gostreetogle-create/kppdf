<div class="login-page">
  <div class="login-card">
    <div class="login-card__logo">КП</div>
    <h1 class="login-card__title">Вход в систему</h1>

    @if (error()) {
      <ui-alert type="error">{{ error() }}</ui-alert>
    }

    <ui-form-field label="Логин" [required]="true">
      <input
        type="text"
        [(ngModel)]="username"
        placeholder="owner"
        (keydown.enter)="submit()"
        autocomplete="username"
      />
    </ui-form-field>

    <ui-form-field label="Пароль" [required]="true">
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        (keydown.enter)="submit()"
        autocomplete="current-password"
      />
    </ui-form-field>

    <label class="remember-me">
      <input type="checkbox" [(ngModel)]="rememberMe" />
      <span>Запомнить меня</span>
    </label>

    <button
      ui-btn
      variant="primary"
      class="login-card__submit"
      (click)="submit()"
      [disabled]="loading()">
      {{ loading() ? 'Вход...' : 'Войти' }}
    </button>

    <div class="login-card__divider">или</div>

    <ui-form-field label="Гостевая ссылка">
      <input
        type="text"
        [(ngModel)]="guestLink"
        placeholder="Вставьте ссылку или токен"
        (keydown.enter)="enterGuest()"
        autocomplete="off"
      />
    </ui-form-field>

    <button
      ui-btn
      variant="ghost"
      class="login-card__guest"
      (click)="enterGuest()">
      Войти как гость
    </button>
  </div>
</div>
