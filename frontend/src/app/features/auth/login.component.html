<div class="login-page">
  <form class="login-card" #loginForm="ngForm" (ngSubmit)="submit()" novalidate>
    <div class="login-card__logo">КП</div>
    <h1 class="login-card__title">Вход в систему</h1>

    @if (error()) {
      <ui-alert type="error">{{ error() }}</ui-alert>
    }

    <ui-form-field label="Логин" [required]="true" [submitted]="loginForm.submitted">
      <input
        name="username"
        type="text"
        [(ngModel)]="username"
        required
        minlength="3"
        pattern="^[a-zA-Z0-9._-]+$"
        placeholder="owner"
        (keydown.enter)="submit()"
        autocomplete="username"
      />
    </ui-form-field>

    <ui-form-field label="Пароль" [required]="true" [submitted]="loginForm.submitted">
      <input
        name="password"
        type="password"
        [(ngModel)]="password"
        required
        minlength="8"
        placeholder="••••••••"
        (keydown.enter)="submit()"
        autocomplete="current-password"
      />
    </ui-form-field>

    <label class="remember-me">
      <input name="rememberMe" type="checkbox" [(ngModel)]="rememberMe" />
      <span>Запомнить меня</span>
    </label>

    <button
      type="submit"
      ui-btn
      variant="primary"
      class="login-card__submit"
      [disabled]="loading()">
      {{ loading() ? 'Вход...' : 'Войти' }}
    </button>

    <div class="login-card__divider">или</div>

    <ui-form-field label="Гостевая ссылка" [submitted]="loginForm.submitted">
      <input
        name="guestLink"
        type="text"
        [(ngModel)]="guestLink"
        placeholder="Вставьте ссылку или токен"
        (keydown.enter)="enterGuest()"
        autocomplete="off"
      />
    </ui-form-field>

    <button
      ui-btn
      variant="ghost"
      class="login-card__guest"
      (click)="enterGuest()">
      Войти как гость
    </button>
  </form>
</div>
