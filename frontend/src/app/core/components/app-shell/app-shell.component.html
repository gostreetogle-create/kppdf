<!-- Mobile overlay -->
@if (sidebarOpen()) {
  <div class="sidebar-overlay" (click)="closeSidebar()"></div>
}

<!-- Mobile toggle -->
<button class="sidebar-toggle no-print" (click)="toggleSidebar()" aria-label="Меню">
  ☰
</button>

<div class="shell-layout">
  <!-- Sidebar -->
  <aside class="sidebar no-print" [class.sidebar--open]="sidebarOpen()">
    <div class="sidebar__brand">
      <a routerLink="/" (click)="closeSidebar()">КП PDF</a>
    </div>

    <nav class="sidebar__nav">
      <a routerLink="/"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{exact:true}"
         (click)="closeSidebar()">
        <span class="sidebar__icon">📄</span> КП
      </a>
      <a routerLink="/products"
         routerLinkActive="active"
         (click)="closeSidebar()">
        <span class="sidebar__icon">📦</span> Товары
      </a>
      <a routerLink="/counterparties"
         routerLinkActive="active"
         (click)="closeSidebar()">
        <span class="sidebar__icon">🏢</span> Контрагенты
      </a>
      <ng-container *appCan="'settings.write'">
        <a routerLink="/settings"
           routerLinkActive="active"
           (click)="closeSidebar()">
          <span class="sidebar__icon">⚙️</span> Настройки
        </a>
      </ng-container>
      <ng-container *appCan="'users.manage'">
        <a routerLink="/users"
           routerLinkActive="active"
           (click)="closeSidebar()">
          <span class="sidebar__icon">👤</span> Пользователи
        </a>
        <a routerLink="/roles-permissions"
           routerLinkActive="active"
           (click)="closeSidebar()">
          <span class="sidebar__icon">🛡️</span> Роли и полномочия
        </a>
      </ng-container>
      <ng-container *appCan="'settings.write'">
        <a routerLink="/dictionaries"
           routerLinkActive="active"
           (click)="closeSidebar()">
          <span class="sidebar__icon">📚</span> Справочники
        </a>
      </ng-container>
    </nav>

    <div class="sidebar__footer">
      @if (user()) {
        <span class="sidebar__username">{{ user()!.name }}</span>
        <div class="sidebar__footer-actions">
          <button
            ui-btn
            icon
            variant="ghost"
            class="theme-toggle"
            [attr.aria-label]="isDark() ? 'Включить светлую тему' : 'Включить темную тему'"
            [title]="isDark() ? 'Светлая тема' : 'Темная тема'"
            (click)="toggleTheme()">
            <div class="theme-toggle__container" [class.is-dark]="isDark()">
              <span class="theme-toggle__icon sun">☀️</span>
              <span class="theme-toggle__icon moon">🌙</span>
            </div>
          </button>
          <button ui-btn size="sm" variant="ghost" (click)="logout()">Выйти</button>
        </div>
      }
    </div>
  </aside>

  <!-- Main content -->
  <main class="shell-content">
    <router-outlet />
  </main>
</div>

<app-toast />
<app-modal-confirm />
