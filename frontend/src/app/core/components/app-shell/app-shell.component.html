<header class="shell-header no-print">
  <a routerLink="/" class="shell-header__brand">КП PDF</a>
  <nav class="shell-header__nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">КП</a>
    <a routerLink="/products" routerLinkActive="active">Товары</a>
    <a routerLink="/settings" routerLinkActive="active">Настройки</a>
  </nav>
  <div class="shell-header__user">
    @if (user()) {
      <span class="shell-header__name">{{ user()!.name }}</span>
      <button ui-btn size="sm" (click)="logout()">Выйти</button>
    }
  </div>
</header>

<main class="shell-content">
  <router-outlet />
</main>

<app-toast />
