<div class="toast-container">
  @for (toast of ns.toasts(); track toast.id) {
    <div class="toast toast--{{ toast.type }}" role="status" (click)="dismissToast(toast.id)">
      <span class="toast__icon">
        @switch (toast.type) {
          @case ('success') { ✓ }
          @case ('error')   { ✕ }
          @case ('warning') { ⚠ }
          @case ('info')    { ℹ }
        }
      </span>
      <span class="toast__message">{{ toast.message || 'Произошла неизвестная ошибка' }}</span>
      <button
        type="button"
        class="toast__close"
        aria-label="Закрыть уведомление"
        (click)="dismissToast(toast.id, $event)">
        ×
      </button>
    </div>
  }
</div>
