services:

  mongodb:
    image: mongo:7
    container_name: kp-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-kp-app}
    volumes:
      - mongo_data:/data/db
    networks:
      - kp-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: kp-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/${MONGO_DB:-kp-app}
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - kp-net

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: kp-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - kp-net

volumes:
  mongo_data:

networks:
  kp-net:
    driver: bridge
