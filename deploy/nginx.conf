server {
  listen 80;
  server_name _;
  client_max_body_size 25m;

  gzip on;
  gzip_min_length 1000;
  gzip_comp_level 6;
  gzip_types application/json application/javascript text/css text/html;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  # Проксируем API на бэкенд
  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Статика Angular (js/css/assets) — долгий кэш
  location ~* \.(?:js|mjs|css|map|woff2?|ico|png|jpg|jpeg|gif|svg|webp)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # index.html — без кэша (чтобы после деплоя не грузили старый)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # SPA fallback — все пути отдаём index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
